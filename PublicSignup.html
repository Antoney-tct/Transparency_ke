<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration — Government of Kenya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #0b6e31;
            --green-mid: #0f9544;
            --green-glow: rgba(11,110,49,0.2);
            --green-light: #d4f0de;
            --ink: #0a0a0a;
            --white: #ffffff;
            --off-white: #f4f7f4;
            --muted: #6b7280;
            --border: rgba(0,0,0,0.09);
            --input-bg: #f4f7f4;
            --error: #dc3545;
            --success: #16a34a;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--off-white);
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── TOP BAND ── */
        .top-band {
            background: var(--ink);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-band img {
            height: 36px;
            filter: brightness(0) invert(1);
            opacity: 0.85;
        }
        .top-band-text span:first-child {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: white;
            display: block;
            line-height: 1.2;
        }
        .top-band-text span:last-child {
            font-family: 'DM Mono', monospace;
            font-size: 0.58rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* ── PAGE LAYOUT ── */
        .page-wrap {
            max-width: 620px;
            margin: 0 auto;
            padding: 3rem 1.5rem 5rem;
        }

        /* ── CARD ── */
        .form-card {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 8px 50px rgba(0,0,0,0.07);
            overflow: hidden;
        }

        /* Card header with accent gradient */
        .card-header {
            position: relative;
            padding: 2.5rem 2.5rem 2rem;
            overflow: hidden;
            background: linear-gradient(135deg, #0a5228 0%, var(--ink) 60%);
        }
        .card-header::after {
            content: '🇰🇪';
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 5rem;
            opacity: 0.08;
            pointer-events: none;
        }

        .card-header-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #7effa8;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .card-header-tag::before {
            content: ''; display: block;
            width: 14px; height: 2px;
            background: #7effa8;
        }
        .card-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            color: white;
            margin-bottom: 0.35rem;
            position: relative;
            z-index: 1;
        }
        .card-header p {
            color: rgba(255,255,255,0.5);
            font-size: 0.875rem;
            position: relative;
            z-index: 1;
        }

        /* ── FORM BODY ── */
        .card-body { padding: 2.5rem; }

        .msg-box {
            border-radius: 10px;
            padding: 0.85rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1.75rem;
            display: none;
        }
        .msg-box.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
        .msg-box.error { background: #fff5f5; color: var(--error); border: 1px solid #fecaca; }

        .field { margin-bottom: 1.15rem; }
        .field label {
            display: block;
            font-size: 0.77rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.4rem;
            letter-spacing: 0.02em;
        }
        .field label .req { color: var(--green-mid); margin-left: 2px; }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.82rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            color: var(--ink);
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: var(--green-mid);
            background: white;
            box-shadow: 0 0 0 3px var(--green-glow);
        }
        input::placeholder { color: #bbc; }

        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 2.75rem; }
        .pw-toggle {
            position: absolute;
            right: 10px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            width: 20px; height: 20px;
            fill: var(--muted);
            border: none; background: none; padding: 0;
            display: grid; place-items: center;
            transition: fill 0.2s;
        }
        .pw-toggle:hover { fill: var(--green); }
        .pw-toggle svg { width: 20px; height: 20px; }

        /* Password strength indicator */
        .pw-strength {
            margin-top: 6px;
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .pw-bar {
            flex: 1;
            height: 3px;
            border-radius: 10px;
            background: var(--border);
            transition: background 0.3s;
        }
        .pw-bar.weak { background: #ef4444; }
        .pw-bar.medium { background: #f59e0b; }
        .pw-bar.strong { background: var(--green-mid); }
        .pw-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .section-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.5rem 0 1rem;
        }
        .section-divider span {
            font-family: 'DM Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-submit {
            width: 100%;
            padding: 0.95rem;
            background: var(--ink);
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            border: none;
            border-radius: 11px;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 1.25rem;
            letter-spacing: 0.02em;
        }
        .btn-submit:hover {
            background: var(--green);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px var(--green-glow);
        }
        .btn-submit:disabled { opacity: 0.55; transform: none; cursor: not-allowed; }

        /* Benefit pills */
        .benefit-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--green-light);
            color: var(--green);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.35rem 0.8rem;
            border-radius: 50px;
        }
        .pill::before { content: '✓'; font-size: 0.7rem; }

        .card-footer {
            padding: 1.5rem 2.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .card-footer a { color: var(--green); font-weight: 600; text-decoration: none; }
        .card-footer a:hover { text-decoration: underline; }

        @media (max-width: 560px) {
            .card-header, .card-body { padding: 1.75rem 1.5rem; }
            .card-footer { padding: 1.25rem 1.5rem; }
            .page-wrap { padding: 1.5rem 1rem 4rem; }
        }
    </style>
</head>
<body>

<div class="top-band">
    <img src="Photos/ark-lab-kenya-coat-of-arms-detailed-2200x1238-removebg-preview.png" alt="Kenya Coat of Arms">
    <div class="top-band-text">
        <span>Government of Kenya</span>
        <span>Official Digital Portal</span>
    </div>
</div>

<div class="page-wrap">
    <div class="form-card">

        <div class="card-header">
            <div class="card-header-tag">Citizen Access</div>
            <h1>Create Your Account</h1>
            <p>Join the Government of Kenya digital portal and access public services</p>
        </div>

        <div class="card-body">

            <div class="benefit-pills">
                <span class="pill">Track Projects</span>
                <span class="pill">Government Updates</span>
                <span class="pill">County Services</span>
                <span class="pill">Budget Reports</span>
            </div>

            <div id="errorMessage" class="msg-box error"></div>
            <div id="successMessage" class="msg-box success"></div>

            <form id="signupForm">
                <input type="hidden" name="userType" value="citizen">

                <div class="field">
                    <label for="fullName">Full Name <span class="req">*</span></label>
                    <input type="text" id="fullName" name="name" placeholder="e.g. John Kamau Njoroge" required>
                </div>

                <div class="field">
                    <label for="email">Email Address <span class="req">*</span></label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="field">
                        <label for="nationalId">National ID <span class="req">*</span></label>
                        <input type="text" id="nationalId" name="nationalId" placeholder="ID Number" required inputmode="numeric">
                    </div>
                    <div class="field">
                        <label for="phone">Phone Number <span class="req">*</span></label>
                        <input type="text" id="phone" name="phone" placeholder="07..." required inputmode="tel">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="field">
                        <label for="county">Home County <span class="req">*</span></label>
                        <select id="county" name="county" required>
                            <option value="">Select County</option>
                            <option value="Nairobi">Nairobi</option>
                            <option value="Mombasa">Mombasa</option>
                            <option value="Kisumu">Kisumu</option>
                            <option value="Kiambu">Kiambu</option>
                            <option value="Nakuru">Nakuru</option>
                            <!-- Add more counties as needed -->
                        </select>
                    </div>
                    <div class="field">
                        <label for="category">User Category <span class="req">*</span></label>
                        <select id="category" name="category" required>
                            <option value="General">General Public</option>
                            <option value="Student">Student</option>
                            <option value="Business">Business Owner</option>
                            <option value="Researcher">Researcher</option>
                            <option value="Journalist">Journalist</option>
                        </select>
                    </div>
                </div>

                <div class="section-divider"><span>Security</span></div>

                <div class="field">
                    <label for="password">Password <span class="req">*</span></label>
                    <div class="pw-wrap">
                        <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                        <button type="button" class="pw-toggle" id="togglePassword" aria-label="Toggle password">
                            <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12c-2.761 0-5-2.238-5-5 0-2.762 2.239-5 5-5s5 2.238 5 5c0 2.762-2.239 5-5 5zm0-8c-1.654 0-3 1.346-3 3s1.346 3 3 3 3-1.346 3-3-1.346-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="pw-strength" id="pwStrength">
                        <div class="pw-bar" id="bar1"></div>
                        <div class="pw-bar" id="bar2"></div>
                        <div class="pw-bar" id="bar3"></div>
                        <span class="pw-label" id="pwLabel">Strength</span>
                    </div>
                </div>

                <div class="field">
                    <label for="confirmPassword">Confirm Password <span class="req">*</span></label>
                    <div class="pw-wrap">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required>
                        <button type="button" class="pw-toggle" id="toggleConfirmPassword" aria-label="Toggle confirm password">
                            <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12c-2.761 0-5-2.238-5-5 0-2.762 2.239-5 5-5s5 2.238 5 5c0 2.762-2.239 5-5 5zm0-8c-1.654 0-3 1.346-3 3s1.346 3 3 3 3-1.346 3-3-1.346-3-3-3z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Create My Account</button>
            </form>
        </div>

        <div class="card-footer">
            Already have an account? <a href="Log_in.html">Sign In</a>
        </div>
    </div>
</div>

<script>
    // ── Password toggles ──
    const setupToggle = (inputId, btnId, iconId) => {
        const input = document.getElementById(inputId);
        const btn = document.getElementById(btnId);
        const icon = document.getElementById(iconId);
        const showSVG = `<path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 12c-2.761 0-5-2.238-5-5 0-2.762 2.239-5 5-5s5 2.238 5 5c0 2.762-2.239 5-5 5zm0-8c-1.654 0-3 1.346-3 3s1.346 3 3 3 3-1.346 3-3-1.346-3-3-3z"/>`;
        const hideSVG = `<path d="M2 5l2.29 2.29c-1.45 1.23-2.58 2.69-3.29 4.21 1.73 3.71 6.29 7 11 7 2.24 0 4.38-.67 6.17-1.8l2.61 2.61 1.42-1.42-20-20-1.42 1.42 2.29 2.29zm6.04 6.04l2.01 2.01c-.03.08-.05.16-.05.25 0 .83.67 1.5 1.5 1.5.09 0 .17-.02.25-.05l2.01 2.01c-.59.14-1.21.24-1.76.24-3.2 0-6.5-2.13-8.11-5 0 0 1.25-2.27 3.15-3.96zm7.07-2.53l2.42 2.42c-.11.7-.41 1.35-.86 1.87l-2.02-2.02c.05-.14.09-.3.09-.47 0-.83-.67-1.5-1.5-1.5-.17 0-.33.04-.47.09l-2.02-2.02c.52-.45 1.17-.75 1.87-.86l.5.5z"/>`;
        btn.addEventListener('click', () => {
            const show = input.getAttribute('type') === 'password';
            input.setAttribute('type', show ? 'text' : 'password');
            icon.innerHTML = show ? hideSVG : showSVG;
        });
    };
    setupToggle('password', 'togglePassword', 'eyeIcon1');
    setupToggle('confirmPassword', 'toggleConfirmPassword', 'eyeIcon2');

    // ── Password strength meter ──
    document.getElementById('password').addEventListener('input', function () {
        const val = this.value;
        const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
        const label = document.getElementById('pwLabel');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
        if (/\d/.test(val) && /[@$!%*?&]/.test(val)) score++;
        const levels = [['weak', 'Weak', 1], ['medium', 'Fair', 2], ['strong', 'Strong', 3]];
        bars.forEach((b, i) => { b.className = 'pw-bar'; });
        if (val.length === 0) { label.textContent = 'Strength'; return; }
        const [cls, lbl] = levels[score - 1] || levels[0];
        for (let i = 0; i < score; i++) bars[i].classList.add(cls);
        label.textContent = lbl;
        label.style.color = cls === 'weak' ? '#ef4444' : cls === 'medium' ? '#f59e0b' : '#0f9544';
    });

    // ── Validation ──
    const validateForm = (data) => {
        const errors = [];
        if (!data.name || data.name.length < 5) errors.push('Full name must be at least 5 characters');
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) errors.push('Invalid email address');
        if (!/^\d{8,15}$/.test(data.nationalId)) errors.push('National ID must be 8–15 digits');
        if (!/^\d{10,15}$/.test(data.phone)) errors.push('Phone number must be 10–15 digits');
        if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/.test(data.password))
            errors.push('Password: 8+ chars, uppercase, lowercase, number, special character');
        if (data.password !== data.confirmPassword) errors.push('Passwords do not match');
        return errors;
    };

    // ── Form submit ──
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';

        const formData = Object.fromEntries(new FormData(form));
        const errors = validateForm(formData);

        if (errors.length > 0) {
            errorDiv.innerHTML = errors.join('<br>');
            errorDiv.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
        }

        submitBtn.disabled = true;
        const originalLabel = submitBtn.textContent;
        submitBtn.textContent = 'Creating account…';

        try {
            const response = await fetch('register_user.php', { method: 'POST', body: new FormData(form) });
            if (!response.ok) throw new Error('Network error');
            const result = await response.json();

            if (result.success) {
                successDiv.textContent = result.message + ' Redirecting to login…';
                successDiv.style.display = 'block';
                form.reset();
                setTimeout(() => {
                    window.location.href = `Log_in.html?signup=success&email=${encodeURIComponent(formData.email)}`;
                }, 2000);
            } else {
                errorDiv.textContent = result.message || 'An unknown error occurred.';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'A network or server error occurred. Please try again later.';
            errorDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = originalLabel;
        }
    });
</script>
</body>
</html>
