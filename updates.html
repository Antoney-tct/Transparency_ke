<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — Kenya Transparency Portal</title>
<link rel="icon" href="Photos/ark-lab-kenya-coat-of-arms-detailed-2200x1238-removebg-preview.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--green:#0b6e31;--gm:#0f9544;--gl:rgba(11,149,68,.1);--navy:#0f1e4a;--nm:#1d3a8a;--nl:rgba(29,58,138,.1);--amber:#d97706;--al:rgba(217,119,6,.1);--red:#b91c1c;--rl:rgba(185,28,28,.1);--bg:#f2f4f3;--sf:#fff;--sf2:#f8faf9;--bd:rgba(0,0,0,.07);--bds:rgba(0,0,0,.13);--ink:#111a14;--im:#374840;--mt:#7a8a80;--sh:0 2px 20px rgba(0,0,0,.06);}
[data-theme=dark]{--bg:#0c1410;--sf:#141d17;--sf2:#1a2520;--bd:rgba(255,255,255,.06);--bds:rgba(255,255,255,.12);--ink:#e8f0ea;--im:#b4c4ba;--mt:#6b7d71;--gl:rgba(11,149,68,.12);--al:rgba(217,119,6,.12);--rl:rgba(185,28,28,.12);--nl:rgba(29,58,138,.15);}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--gm);border-radius:10px;}
header{position:sticky;top:0;z-index:900;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
[data-theme=dark] header{background:rgba(14,22,17,.94);}
.hdr{max-width:1100px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;gap:1rem;}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-wrap img{height:38px;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--ink);}
.logo-text span{color:var(--gm);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:.6rem;}
.hdr-nav a{font-size:.82rem;font-weight:500;color:var(--mt);text-decoration:none;padding:.4rem .85rem;border-radius:8px;transition:all .2s;}
.hdr-nav a:hover{color:var(--gm);background:var(--gl);}
.ib{width:36px;height:36px;border-radius:9px;border:1px solid var(--bd);background:var(--sf2);color:var(--mt);font-size:.82rem;display:grid;place-items:center;cursor:pointer;text-decoration:none;transition:all .2s;}
.ib:hover{border-color:var(--gm);color:var(--gm);}
.pw{max-width:1100px;margin:0 auto;padding:2.5rem 2rem 4rem;}
.page-hero{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:2rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.5rem;box-shadow:var(--sh);}
.ph-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--gm));color:white;display:grid;place-items:center;font-size:1.4rem;flex-shrink:0;}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--ink);}
.ph-sub{font-size:.85rem;color:var(--mt);margin-top:.25rem;}
.ph-actions{margin-left:auto;display:flex;gap:.65rem;}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:.55rem 1.1rem;border-radius:10px;border:1px solid var(--bds);background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:500;color:var(--mt);transition:all .2s;}
.btn-sm:hover{border-color:var(--gm);color:var(--gm);}
.btn-sm.primary{background:var(--green);color:white;border-color:var(--green);}
.btn-sm.primary:hover{background:var(--gm);}
/* FILTER */
.filter-bar{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
.ftab{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;padding:.45rem 1rem;border-radius:9px;border:1px solid var(--bd);background:var(--sf);color:var(--mt);cursor:pointer;transition:all .2s;white-space:nowrap;}
.ftab:hover{border-color:var(--gm);color:var(--gm);}
.ftab.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
[data-theme=dark] .ftab.active{background:white;color:#0c1410;border-color:white;}
.badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:.6rem;font-weight:700;margin-left:4px;}
/* NOTIF ITEMS */
.notif-list{display:flex;flex-direction:column;gap:.75rem;}
.ni{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:1.25rem 1.5rem;display:flex;gap:1rem;align-items:flex-start;transition:all .2s;cursor:pointer;position:relative;}
.ni:hover{border-color:var(--gm);box-shadow:0 4px 20px rgba(11,149,68,.1);transform:translateX(3px);}
.ni.unread{border-left:3px solid var(--gm);}
.ni.unread-red{border-left:3px solid var(--red);}
.ni.unread-amber{border-left:3px solid var(--amber);}
.ni.unread-navy{border-left:3px solid var(--nm);}
.ni-icon{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:.9rem;flex-shrink:0;}
.ni-icon.g{background:var(--gl);color:var(--gm);}
.ni-icon.r{background:var(--rl);color:var(--red);}
.ni-icon.a{background:var(--al);color:var(--amber);}
.ni-icon.n{background:var(--nl);color:var(--nm);}
.ni-icon.gr{background:rgba(100,116,139,.1);color:#64748b;}
.ni-body{flex:1;}
.ni-title{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:.25rem;}
.ni.read .ni-title{font-weight:500;color:var(--im);}
.ni-desc{font-size:.8rem;color:var(--mt);line-height:1.55;margin-bottom:.5rem;}
.ni-meta{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.ni-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .55rem;border-radius:50px;font-weight:600;}
.tag-project{background:var(--gl);color:var(--gm);}
.tag-budget{background:var(--nl);color:var(--nm);}
.tag-inquiry{background:var(--al);color:var(--amber);}
.tag-system{background:rgba(100,116,139,.1);color:#64748b;}
.tag-alert{background:var(--rl);color:var(--red);}
.ni-time{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--mt);margin-left:auto;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--red);position:absolute;top:1.1rem;right:1.1rem;flex-shrink:0;}
/* GROUP LABEL */
.group-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mt);padding:.5rem 0;margin-top:.5rem;display:flex;align-items:center;gap:8px;}
.group-label::after{content:'';flex:1;height:1px;background:var(--bd);}
/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--mt);}
.empty i{font-size:3rem;margin-bottom:1rem;opacity:.25;}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:.4rem;}
footer{background:#080f0a;padding:2rem;text-align:center;margin-top:4rem;}
footer p{font-family:'JetBrains Mono',monospace;font-size:.67rem;color:rgba(255,255,255,.3);}
@media(max-width:600px){.pw{padding:1.5rem 1rem;}.ph-actions{display:none;}}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <a href="index.html" class="logo-wrap"><img src="Photos/ark-lab-kenya-coat-of-arms-detailed-2200x1238-removebg-preview.png" alt="Logo"><div class="logo-text">Kenya <span>Transparency</span></div></a>
    <nav class="hdr-nav" style="margin-left:1.5rem;display:flex;gap:.2rem">
      <a href="user_dashboard.html">Dashboard</a><a href="Projects.html">Projects</a><a href="Budget.html">Budget</a>
    </nav>
    <div class="hdr-right">
      <button class="ib" id="themeToggle"><i class="fas fa-moon"></i></button>
      <a href="pprofile.html" class="ib"><i class="fas fa-user"></i></a>
    </div>
  </div>
</header>

<div class="pw">
  <div class="page-hero">
    <div class="ph-icon"><i class="fas fa-bell"></i></div>
    <div>
      <div class="ph-title">Notifications</div>
      <div class="ph-sub">You have <span id="unreadCount" style="color:var(--red);font-weight:700">7</span> unread notifications</div>
    </div>
    <div class="ph-actions">
      <button class="btn-sm" onclick="markAllRead()"><i class="fas fa-check-double"></i> Mark All Read</button>
      <button class="btn-sm" onclick="clearAll()"><i class="fas fa-trash-alt"></i> Clear All</button>
      <button class="btn-sm primary" onclick="location.href='User_inquirery.html'"><i class="fas fa-paper-plane"></i> New Inquiry</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="ftab active" onclick="filter(this,'all')">All <span class="badge" style="background:var(--red);color:white">7</span></button>
    <button class="ftab" onclick="filter(this,'project')">Projects</button>
    <button class="ftab" onclick="filter(this,'budget')">Budget</button>
    <button class="ftab" onclick="filter(this,'inquiry')">Inquiries</button>
    <button class="ftab" onclick="filter(this,'system')">System</button>
    <button class="ftab" onclick="filter(this,'alert')">Alerts</button>
    <button class="ftab" onclick="filter(this,'read')" style="margin-left:auto">Show Read Only</button>
  </div>

  <div id="notifList" class="notif-list"></div>
</div>

<footer><p>© 2025 Government of Kenya Transparency Portal · All rights reserved</p></footer>

<script>
(function(){const b=document.getElementById('themeToggle'),i=b.querySelector('i');const t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');function a(th){document.documentElement.setAttribute('data-theme',th);i.className=th==='dark'?'fas fa-sun':'fas fa-moon';localStorage.setItem('theme',th);}a(t);b.addEventListener('click',()=>a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));})();

let NOTIFS=[
  {id:1,icon:'fas fa-project-diagram',iconClass:'g',title:'Riruta–Ngong Railway: Construction Milestone Reached',desc:'Civil foundation works and Karen Bridge piers are now 62% complete. Phase 1 on track for 2026 delivery. View the full project update.',tag:'project',tagClass:'tag-project',time:'2 minutes ago',read:false,link:'Riruta-Ngong.html',border:'unread'},
  {id:2,icon:'fas fa-exclamation-circle',iconClass:'r',title:'Budget Alert: KSh 3.66B Kenol–Sagana Pending Bills',desc:'The Auditor-General flagged KSh 3.66B in pending bills for the Kenol-Sagana-Marua road project including land compensation arrears of KSh 2.46B.',tag:'alert',tagClass:'tag-alert',time:'1 hour ago',read:false,link:'Kenol-Sagana-Marua.html',border:'unread-red'},
  {id:3,icon:'fas fa-reply',iconClass:'a',title:'Your Inquiry Has Been Replied To',desc:'The Ministry of Roads & Transport has responded to your inquiry reference #INQ-2025-0412 regarding the Ngong Road expansion project.',tag:'inquiry',tagClass:'tag-inquiry',time:'3 hours ago',read:false,link:'User_inquirery.html',border:'unread-amber'},
  {id:4,icon:'fas fa-ship',iconClass:'n',title:'LAPSSET: Lamu Port Cargo Hits Record 799,161 Tonnes',desc:'Lamu Port recorded 799,161 metric tonnes in 2025 — a 14-fold increase since 2018. The port is now fully operational with 4 berths.',tag:'project',tagClass:'tag-project',time:'Yesterday, 9:15 AM',read:false,link:'LAPSSET.html',border:'unread-navy'},
  {id:5,icon:'fas fa-tint',iconClass:'g',title:'Mwache Dam: 24-Hour Concreting Begins',desc:'Round-the-clock concreting of the 87.5m main dam wall commenced in March 2025. The lower check dam is 68% complete.',tag:'project',tagClass:'tag-project',time:'Yesterday, 2:30 PM',read:false,link:'Mwache-dam.html',border:'unread'},
  {id:6,icon:'fas fa-coins',iconClass:'n',title:'FY 2024/25 Budget: KSh 3.99 Trillion Approved',desc:'The National Assembly approved the FY 2024/25 budget totalling KSh 3.99 trillion, with development expenditure at KSh 1.08 trillion.',tag:'budget',tagClass:'tag-budget',time:'2 days ago',read:false,link:'Budget.html',border:'unread-navy'},
  {id:7,icon:'fas fa-check-circle',iconClass:'g',title:'Dongo Kundu Bypass Fully Opened to Public',desc:'The 17.5km Dongo Kundu Bypass — including the 1,440m Mteza Bridge, longest in East Africa — is now fully open to all vehicles.',tag:'project',tagClass:'tag-project',time:'3 days ago',read:false,link:'Dongo-kundu.html',border:'unread'},
  {id:8,icon:'fas fa-bolt',iconClass:'a',title:'Last Mile Phase 4: 280,000 More Households to Be Connected',desc:'President Ruto signed the KSh 27B Phase 4 contract connecting 280,000 households across 32 counties. Completion by 2026.',tag:'project',tagClass:'tag-project',time:'4 days ago',read:true,link:'Last-mile.html',border:''},
  {id:9,icon:'fas fa-seedling',iconClass:'g',title:'Galana Kulalu: Athi Dam Contract Signed',desc:'China Communications Construction Company signed the Athi Dam contract on 30 December 2025, unlocking full irrigation potential for 250,000 acres.',tag:'project',tagClass:'tag-project',time:'5 days ago',read:true,link:'Galana-kulalu.html',border:''},
  {id:10,icon:'fas fa-shield-alt',iconClass:'gr',title:'System Update: Two-Factor Authentication Now Available',desc:'Your account security has been upgraded. Enable 2FA in your profile settings for enhanced protection of your portal account.',tag:'system',tagClass:'tag-system',time:'1 week ago',read:true,link:'pprofile.html',border:''},
  {id:11,icon:'fas fa-file-alt',iconClass:'n',title:'New Government Report: Q1 2025 Infrastructure Report Published',desc:'The Q1 2025 Quarterly Infrastructure Development Report is now available. Download and review project progress across all 47 counties.',tag:'system',tagClass:'tag-system',time:'1 week ago',read:true,link:'Reports.html',border:''},
  {id:12,icon:'fas fa-gavel',iconClass:'a',title:'New Tender: SGR Naivasha–Kisumu Extension (KSh 263B)',desc:'KeNHA has published a pre-qualification notice for the Naivasha–Kisumu SGR extension. Deadline: 30 May 2025. Download the tender documents.',tag:'system',tagClass:'tag-system',time:'10 days ago',read:true,link:'Tenders.html',border:''},
];

let currentFilter='all';

function renderNotifs(){
  const list=document.getElementById('notifList');
  let data=NOTIFS;
  if(currentFilter==='read') data=NOTIFS.filter(n=>n.read);
  else if(currentFilter!=='all') data=NOTIFS.filter(n=>n.tag===currentFilter);
  
  if(data.length===0){list.innerHTML=`<div class="empty"><i class="fas fa-bell-slash"></i><h3>No notifications</h3><p>Nothing to show for this filter.</p></div>`;return;}
  
  const today=data.filter(n=>!n.read),older=data.filter(n=>n.read);
  let html='';
  if(today.length){html+=`<div class="group-label">Unread</div>`;html+=today.map(n=>niHtml(n)).join('');}
  if(older.length){html+=`<div class="group-label">Read</div>`;html+=older.map(n=>niHtml(n)).join('');}
  list.innerHTML=html;
  document.getElementById('unreadCount').textContent=NOTIFS.filter(n=>!n.read).length;
}

function niHtml(n){
  return `<div class="ni ${n.border} ${n.read?'read':''}" onclick="markRead(${n.id},'${n.link}')">
    <div class="ni-icon ${n.iconClass}"><i class="${n.icon}"></i></div>
    <div class="ni-body">
      <div class="ni-title">${n.title}</div>
      <div class="ni-desc">${n.desc}</div>
      <div class="ni-meta">
        <span class="ni-tag ${n.tagClass}">${n.tag}</span>
        <span class="ni-time"><i class="fas fa-clock" style="margin-right:3px"></i>${n.time}</span>
      </div>
    </div>
    ${!n.read?'<div class="unread-dot"></div>':''}
  </div>`;
}

function markRead(id,link){
  const n=NOTIFS.find(x=>x.id===id);
  if(n){n.read=true;n.border='';}
  renderNotifs();
  if(link&&link!=='#') setTimeout(()=>location.href=link,200);
}

function filter(btn,type){
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');currentFilter=type;renderNotifs();
}

function markAllRead(){NOTIFS.forEach(n=>{n.read=true;n.border='';});renderNotifs();}
function clearAll(){NOTIFS=[];renderNotifs();}

renderNotifs();
</script>
</body>
</html>
